# Holmes — konfiguracja reguł wykrywania anomalii
# Każdą regułę można włączyć/wyłączyć i modyfikować progi.

[rules.cache_invalidation]
enabled = true
# Sesja zużyła < N% tokenów z cache mimo dużej liczby wiadomości
# Sygnał: cache nie działa → kontekst naliczany od nowa przy każdym kroku
min_messages = 10
max_cache_read_ratio = 0.05   # < 5% tokenów z cache
min_input_tokens = 50_000
category = "Cache Invalidation Bug"
severity = "HIGH"
description = "Duże sesje bez cache — kontekst naliczany od nowa przy każdym kroku"

[rules.long_session_overflow]
enabled = true
# Sesja z bardzo dużą liczbą wiadomości bez resetu — ryzyko przepełnienia okna
min_messages = 40
min_total_tokens = 100_000
category = "Long Session Overflow"
severity = "MEDIUM"
description = "Długa sesja bez resetu — ryzyko przepełnienia okna kontekstu i kompresji"

[rules.think_mode_waste]
enabled = true
# Proporcja output do input tokenów bardzo wysoka → Think mode lub filozofowanie
# Output jest 5x droższy niż input (Opus)
min_output_to_input_ratio = 0.8
min_output_tokens = 10_000
min_messages = 5
category = "Think Mode / Output Waste"
severity = "MEDIUM"
description = "Bardzo wysoka proporcja output/input — możliwy Think mode lub verbose responses"

[rules.mcp_overload]
enabled = true
# Sesja z ekstremalnie wysokim kosztem przy stosunkowo małej liczbie wiadomości
# Sygnał: MCP/skills z dużymi payloadami
min_cost_usd = 1.0
max_messages = 20
category = "MCP/Plugin Overload"
severity = "HIGH"
description = "Wysoki koszt przy małej liczbie wiadomości — możliwy przeładowany kontekst MCP"

[rules.session_cost_spike]
enabled = true
# Sesja kosztuje więcej niż N razy mediana wszystkich sesji w okresie
spike_multiplier = 5.0
min_cost_usd = 0.50
category = "Cost Spike"
severity = "HIGH"
description = "Koszt sesji wielokrotnie przekracza medianę — odstający outlier"

[rules.high_cache_creation]
enabled = true
# Dużo cache creation bez odczytów — dane nie są ponownie używane
min_cache_creation_tokens = 30_000
max_cache_read_to_creation_ratio = 0.10  # < 10% odczytów względem tworzenia
min_messages = 5
category = "Wasted Cache Creation"
severity = "LOW"
description = "Dużo tokenów cache creation bez późniejszych odczytów — nieefektywne cachowanie"
